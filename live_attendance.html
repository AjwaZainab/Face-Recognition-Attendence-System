{% extends 'layout.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2"><i class="bi bi-camera-fill"></i> Live Attendance</h1>
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary"><i class="bi bi-arrow-left-circle"></i> Back to Dashboard</a>
</div>
<div class="card shadow-sm">
    <div class="card-body">
        <div id="status" class="alert alert-info text-center">Initializing camera...</div>
        <div class="video-container">
            <video id="video" width="100%" height="auto" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
    </div>
</div>
{% endblock %}
